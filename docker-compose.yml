services:
  postgres:
    image: postgres:16-alpine
    container_name: pulseops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulseops
      POSTGRES_PASSWORD: pulseops
      POSTGRES_DB: pulseops
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pulseops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
